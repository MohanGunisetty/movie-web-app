<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StreamFlix</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <nav class="navbar">
            <a href="index.html" class="nav-brand">StreamFlix</a>
        </nav>

        <div class="auth-container glass fade-in">
            <h2 style="margin-bottom: 20px; text-align: center;">Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <div style="color: #ff4444; margin-bottom: 15px; display: none;" id="error-msg"></div>
                <button type="submit" class="btn" style="width: 100%;">Sign In</button>
            </form>
            <p style="margin-top: 20px; text-align: center; color: var(--text-muted);">
                New here? <a href="register.html" style="color: var(--primary-color);">Create account</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            // Form data required for OAuth2PasswordRequestForm
            const formData = new FormData();
            formData.append('username', email); // backend expects username field for email
            formData.append('password', password);

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || 'Login failed');
                }

                const data = await res.json();
                api.setToken(data.access_token);

                // Redirect based on role or to home
                const role = api.getUserRole();
                if (role === 'ADMIN') {
                    window.location.href = 'admin/dashboard.html';
                } else {
                    window.location.href = 'index.html';
                }

            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
