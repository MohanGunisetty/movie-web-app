<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Movies - StreamFlix Admin</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <nav class="navbar">
            <a href="../index.html" class="nav-brand">StreamFlix Admin</a>
            <div id="nav-links"></div>
        </nav>

        <div class="glass fade-in" style="padding: 30px;">
            <div class="navbar" style="padding: 0; margin-bottom: 20px;">
                <h2>Manage Movies</h2>
                <a href="upload.html" class="btn">Upload New</a>
            </div>

            <table style="width: 100%; border-collapse: collapse; color: var(--text-main);">
                <thead>
                    <tr style="text-align: left; border-bottom: 1px solid var(--border-color);">
                        <th style="padding: 10px;">ID</th>
                        <th style="padding: 10px;">Title</th>
                        <th style="padding: 10px;">Category</th>
                        <th style="padding: 10px;">Uploaded By</th>
                        <th style="padding: 10px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="movies-table">
                    <!-- JS Populated -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        if (api.getUserRole() !== 'ADMIN') window.location.href = '../login.html';

        async function loadMovies() {
            const tbody = document.getElementById('movies-table');
            tbody.innerHTML = '<tr><td colspan="5" style="padding: 20px; text-align: center;">Loading...</td></tr>';

            try {
                const res = await api.fetch('/movies');
                const movies = await res.json();

                if (movies.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="padding: 20px; text-align: center;">No movies found.</td></tr>';
                    return;
                }

                tbody.innerHTML = movies.map(movie => `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td style="padding: 10px;">${movie.id}</td>
                        <td style="padding: 10px;">${movie.title}</td>
                        <td style="padding: 10px;">${movie.category ? movie.category.name : '-'}</td>
                        <td style="padding: 10px;">${movie.uploaded_by}</td>
                        <td style="padding: 10px;">
                            <button onclick="deleteMovie(${movie.id}, '${movie.title}')" class="btn" style="background: #ff4444; padding: 5px 10px; font-size: 0.8rem;">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteMovie(id, title) {
            if (!confirm(`Are you sure you want to delete "${title}"? This cannot be undone.`)) return;

            try {
                const res = await api.fetch(`/admin/movies/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadMovies(); // Refresh
                } else {
                    alert('Failed to delete movie');
                }
            } catch (err) {
                alert('Error deleting movie');
            }
        }

        loadMovies();
    </script>
</body>

</html>
