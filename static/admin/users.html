<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - StreamFlix Admin</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <nav class="navbar">
            <a href="../index.html" class="nav-brand">StreamFlix Admin</a>
            <div id="nav-links"></div>
        </nav>

        <div class="glass fade-in" style="padding: 30px;">
            <h2 style="margin-bottom: 20px;">Manage Users</h2>

            <table style="width: 100%; border-collapse: collapse; color: var(--text-main);">
                <thead>
                    <tr style="text-align: left; border-bottom: 1px solid var(--border-color);">
                        <th style="padding: 10px;">ID</th>
                        <th style="padding: 10px;">Username</th>
                        <th style="padding: 10px;">Email</th>
                        <th style="padding: 10px;">Role</th>
                        <th style="padding: 10px;">Status</th>
                        <th style="padding: 10px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="users-table"></tbody>
            </table>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        if (api.getUserRole() !== 'ADMIN') window.location.href = '../login.html';

        async function loadUsers() {
            const tbody = document.getElementById('users-table');
            tbody.innerHTML = '<tr><td colspan="6" style="padding: 20px; text-align: center;">Loading...</td></tr>';

            try {
                const res = await api.fetch('/admin/users');
                const users = await res.json();

                tbody.innerHTML = users.map(user => `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td style="padding: 10px;">${user.id}</td>
                        <td style="padding: 10px;">${user.username}</td>
                        <td style="padding: 10px;">${user.email}</td>
                        <td style="padding: 10px;">${user.role}</td>
                        <td style="padding: 10px;">
                            <span style="color: ${user.is_active ? '#00ff88' : '#ff4444'}">${user.is_active ? 'Active' : 'Blocked'}</span>
                        </td>
                        <td style="padding: 10px;">
                            ${user.role !== 'ADMIN' ? `
                                <button onclick="toggleBlock(${user.id}, ${!user.is_active})" class="btn" style="background: ${user.is_active ? '#ff4444' : '#00ff88'}; padding: 5px 10px; font-size: 0.8rem;">
                                    ${user.is_active ? 'Block' : 'Unblock'}
                                </button>
                            ` : '-'}
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function toggleBlock(id, newStatus) {
            try {
                const res = await api.fetch(`/admin/users/${id}/block?is_active=${newStatus}`, { method: 'PUT' });
                if (res.ok) {
                    loadUsers();
                } else {
                    alert('Action failed');
                }
            } catch (err) {
                alert('Error updating user');
            }
        }

        loadUsers();
    </script>
</body>

</html>
